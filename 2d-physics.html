<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Physics Demo | Supash Bhat</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: monospace; background: #0a0a1a; }
        canvas { display: block; margin: 0 auto; cursor: grab; }
        #info {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.7); color: white;
            padding: 10px 15px; border-radius: 8px;
            font-size: 12px; pointer-events: none;
            z-index: 10;
        }
        #controls {
            position: absolute; bottom: 20px; left: 20px;
            background: rgba(0,0,0,0.7); color: white;
            padding: 10px 15px; border-radius: 8px;
            font-size: 12px; z-index: 10;
        }
        #controls button {
            background: #60a5fa; border: none; color: white;
            padding: 4px 12px; margin: 4px; border-radius: 4px;
            cursor: pointer;
        }
        #gravity {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(0,0,0,0.7); color: #60a5fa;
            padding: 10px 15px; border-radius: 8px;
            font-family: monospace; font-weight: bold;
            pointer-events: none; z-index: 10;
        }
        @media (max-width: 768px) {
            #info { font-size: 10px; top: 10px; left: 10px; }
            #controls { font-size: 10px; bottom: 10px; left: 10px; }
            #gravity { font-size: 10px; bottom: 10px; right: 10px; }
        }
    </style>
</head>
<body>
    <div id="info">🎮 2D PHYSICS | Click & drag to throw | WASD = gravity | Drag window to shake</div>
    <div id="controls">
        <button onclick="addBall()">➕ Add Ball</button>
        <button onclick="resetBalls()">🔄 Reset</button>
        <button onclick="clearBalls()">🗑️ Clear All</button>
    </div>
    <div id="gravity">🌍 GRAVITY: <span id="gravityDir">DOWN</span></div>
    <canvas id="physicsCanvas" width="1000" height="600" style="width:100%; height:auto; max-width:1000px; aspect-ratio:1000/600"></canvas>

    <script>
        const canvas = document.getElementById('physicsCanvas');
        const ctx = canvas.getContext('2d');
        let width = 1000, height = 600, groundY = height - 50;
        
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            width = canvas.width;
            height = canvas.height;
            groundY = height - 50;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        class Ball {
            constructor(x, y, vx, vy, restitution, radius, color) {
                this.x = x; this.y = y; this.vx = vx; this.vy = vy;
                this.restitution = restitution; this.radius = radius; this.color = color;
            }
        }
        
        let balls = [];
        let gravity = { x: 0, y: 500 };
        let gravityDir = 'DOWN';
        let dragging = null;
        let dragOffset = { x: 0, y: 0 };
        let lastMouse = { x: 0, y: 0 };
        let throwVel = null;
        
        function createBalls() {
            balls = [];
            for (let i = 0; i < 10; i++) {
                balls.push(new Ball(
                    Math.random() * (width - 100) + 50,
                    Math.random() * (groundY - 100) + 50,
                    (Math.random() - 0.5) * 300,
                    (Math.random() - 0.5) * 200,
                    0.65 + Math.random() * 0.3,
                    8 + Math.random() * 10,
                    `hsl(${Math.random() * 360}, 70%, 60%)`
                ));
            }
            balls.push(new Ball(width/2, groundY - 80, 100, -200, 0.95, 18, '#ff6666'));
            updateCount();
        }
        
        function updateCount() {
            document.getElementById('gravityDir').innerText = gravityDir;
        }
        
        window.addBall = () => {
            balls.push(new Ball(
                Math.random() * (width - 100) + 50,
                Math.random() * (groundY - 100) + 50,
                (Math.random() - 0.5) * 300,
                (Math.random() - 0.5) * 200,
                0.6 + Math.random() * 0.35,
                8 + Math.random() * 10,
                `hsl(${Math.random() * 360}, 70%, 60%)`
            ));
        };
        
        window.resetBalls = () => createBalls();
        window.clearBalls = () => { balls = []; };
        
        window.addEventListener('keydown', (e) => {
            if (e.key === 'w') { gravity = { x: 0, y: -500 }; gravityDir = 'UP'; updateCount(); e.preventDefault(); }
            if (e.key === 's') { gravity = { x: 0, y: 500 }; gravityDir = 'DOWN'; updateCount(); e.preventDefault(); }
            if (e.key === 'a') { gravity = { x: -500, y: 0 }; gravityDir = 'LEFT'; updateCount(); e.preventDefault(); }
            if (e.key === 'd') { gravity = { x: 500, y: 0 }; gravityDir = 'RIGHT'; updateCount(); e.preventDefault(); }
        });
        
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
        }
        
        canvas.addEventListener('mousedown', (e) => {
            const mouse = getMousePos(e);
            for (let i = balls.length-1; i >= 0; i--) {
                const b = balls[i];
                if (Math.hypot(mouse.x - b.x, mouse.y - b.y) < b.radius) {
                    dragging = b;
                    dragOffset = { x: b.x - mouse.x, y: b.y - mouse.y };
                    lastMouse = { x: mouse.x, y: mouse.y };
                    break;
                }
            }
        });
        
        canvas.addEventListener('mousemove', (e) => {
            const mouse = getMousePos(e);
            if (dragging) {
                const dx = mouse.x - lastMouse.x;
                const dy = mouse.y - lastMouse.y;
                throwVel = { x: dx / 0.016, y: dy / 0.016 };
                dragging.x = mouse.x + dragOffset.x;
                dragging.y = mouse.y + dragOffset.y;
                dragging.vx = 0;
                dragging.vy = 0;
                lastMouse = { x: mouse.x, y: mouse.y };
                dragging.x = Math.max(dragging.radius, Math.min(width - dragging.radius, dragging.x));
                dragging.y = Math.max(dragging.radius, Math.min(groundY - dragging.radius, dragging.y));
            }
        });
        
        canvas.addEventListener('mouseup', () => {
            if (dragging && throwVel) { dragging.vx = throwVel.x; dragging.vy = throwVel.y; }
            dragging = null; throwVel = null;
        });
        
        function resolveCollision(a, b) {
            const dx = a.x - b.x, dy = a.y - b.y;
            const dist = Math.hypot(dx, dy);
            if (dist === 0) return;
            const minDist = a.radius + b.radius;
            if (dist < minDist) {
                const nx = dx / dist, ny = dy / dist;
                const overlap = minDist - dist;
                a.x += nx * overlap * 0.5; a.y += ny * overlap * 0.5;
                b.x -= nx * overlap * 0.5; b.y -= ny * overlap * 0.5;
                const rvx = a.vx - b.vx, rvy = a.vy - b.vy;
                const velAlong = rvx * nx + rvy * ny;
                if (velAlong > 0) return;
                const e = (a.restitution + b.restitution) / 2;
                const j = -(1 + e) * velAlong / 2;
                a.vx += j * nx; a.vy += j * ny;
                b.vx -= j * nx; b.vy -= j * ny;
            }
        }
        
        function updatePhysics(dt) {
            for (let b of balls) {
                if (b === dragging) continue;
                b.vx += gravity.x * dt; b.vy += gravity.y * dt;
                b.x += b.vx * dt; b.y += b.vy * dt;
                if (b.y + b.radius > groundY) { b.y = groundY - b.radius; b.vy = -b.vy * b.restitution; if (Math.abs(b.vy) < 20) b.vy = 0; }
                if (b.x - b.radius < 0) { b.x = b.radius; b.vx = -b.vx * b.restitution; }
                if (b.x + b.radius > width) { b.x = width - b.radius; b.vx = -b.vx * b.restitution; }
                if (b.y - b.radius < 0) { b.y = b.radius; b.vy = -b.vy * b.restitution; }
            }
            for (let i = 0; i < balls.length; i++)
                for (let j = i+1; j < balls.length; j++)
                    resolveCollision(balls[i], balls[j]);
        }
        
        function draw() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#1e2a3a'; ctx.fillRect(0, groundY, width, height - groundY);
            for (let b of balls) {
                ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2);
                ctx.fillStyle = b.color; ctx.fill();
                ctx.strokeStyle = 'white'; ctx.lineWidth = 1.5; ctx.stroke();
                if (b === dragging) { ctx.beginPath(); ctx.arc(b.x, b.y, b.radius+3, 0, Math.PI*2); ctx.strokeStyle = '#60a5fa'; ctx.lineWidth = 2; ctx.stroke(); }
            }
            ctx.fillStyle = '#94a3b8'; ctx.font = '10px monospace'; ctx.fillText('WASD = gravity | Click & drag to throw', 10, 20);
        }
        
        let lastTime = performance.now();
        function animate() {
            const now = performance.now();
            let dt = Math.min(0.033, (now - lastTime) / 1000);
            if (dt > 0.001) { updatePhysics(dt); draw(); }
            lastTime = now;
            requestAnimationFrame(animate);
        }
        
        // Window shake detection
        let lastWinX = window.screenX, lastWinY = window.screenY;
        function checkShake() {
            const dx = window.screenX - lastWinX, dy = window.screenY - lastWinY;
            if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
                for (let b of balls) { b.vx += dx * 0.2; b.vy += dy * 0.2; }
            }
            lastWinX = window.screenX; lastWinY = window.screenY;
            requestAnimationFrame(checkShake);
        }
        checkShake();
        
        createBalls();
        animate();
    </script>
</body>
</html>
