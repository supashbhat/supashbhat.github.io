<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Physics Demo | Supash Bhat</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: monospace; }
        #info {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.7); color: white;
            padding: 10px 15px; border-radius: 8px;
            font-size: 12px; pointer-events: none;
            z-index: 10;
        }
        #controls {
            position: absolute; bottom: 20px; left: 20px;
            background: rgba(0,0,0,0.7); color: white;
            padding: 10px 15px; border-radius: 8px;
            font-size: 12px; z-index: 10;
        }
        #controls button {
            background: #60a5fa; border: none; color: white;
            padding: 4px 12px; margin: 4px; border-radius: 4px;
            cursor: pointer;
        }
        #gravity {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(0,0,0,0.7); color: #60a5fa;
            padding: 10px 15px; border-radius: 8px;
            font-family: monospace; font-weight: bold;
            pointer-events: none; z-index: 10;
        }
        .note {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0,0,0,0.5); color: #94a3b8;
            padding: 8px 12px; border-radius: 8px;
            font-size: 10px; pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="info">🎮 3D PHYSICS | Mouse drag to rotate view | Number keys 1-6 change gravity</div>
    <div id="controls">
        <button onclick="addBall()">➕ Add Ball</button>
        <button onclick="resetBalls()">🔄 Reset</button>
        <button onclick="clearBalls()">🗑️ Clear All</button>
    </div>
    <div id="gravity">🌍 GRAVITY: <span id="gravityDir">DOWN</span></div>
    <div class="note">💡 For drag-to-throw & window shake → clone repo & run python3 visualize_realtime.py</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);
        scene.fog = new THREE.FogExp2(0x0a0a1a, 0.008);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 12, 18);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.enableZoom = true;
        controls.target.set(0, 0, 0);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const fillLight = new THREE.PointLight(0x4466cc, 0.3);
        fillLight.position.set(0, -5, 0);
        scene.add(fillLight);

        // Environment
        const gridHelper = new THREE.GridHelper(30, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -3;
        scene.add(gridHelper);
        
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(18, 18),
            new THREE.MeshStandardMaterial({ color: 0x1e2a3a, roughness: 0.7, metalness: 0.1, transparent: true, opacity: 0.4 })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -3;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);

        // Ball class
        class Ball3D {
            constructor(x, y, z, vx, vy, vz, restitution, radius, color) {
                this.x = x; this.y = y; this.z = z;
                this.vx = vx; this.vy = vy; this.vz = vz;
                this.restitution = restitution;
                this.radius = radius;
                this.color = color;
                this.mesh = null;
            }
        }
        
        let balls = [];
        let gravity = { x: 0, y: -9.8, z: 0 };
        let gravityName = 'DOWN';
        
        function createBallMesh(ball) {
            const geometry = new THREE.SphereGeometry(ball.radius, 32, 32);
            const material = new THREE.MeshStandardMaterial({ color: ball.color, roughness: 0.3, metalness: 0.1 });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.position.set(ball.x, ball.y, ball.z);
            scene.add(mesh);
            return mesh;
        }
        
        function updateBallMesh(ball) {
            if (ball.mesh) ball.mesh.position.set(ball.x, ball.y, ball.z);
        }
        
        function createBalls() {
            balls.forEach(b => { if (b.mesh) scene.remove(b.mesh); });
            balls = [];
            const colors = [0xff6666, 0x66ff66, 0x6666ff, 0xffaa66, 0xff66ff, 0x66ffaa];
            for (let i = 0; i < 12; i++) {
                const ball = new Ball3D(
                    (Math.random() - 0.5) * 12,
                    Math.random() * 4 - 1,
                    (Math.random() - 0.5) * 12,
                    (Math.random() - 0.5) * 5,
                    (Math.random() - 0.5) * 5,
                    (Math.random() - 0.5) * 5,
                    0.7 + Math.random() * 0.25,
                    0.4 + Math.random() * 0.3,
                    colors[Math.floor(Math.random() * colors.length)]
                );
                ball.mesh = createBallMesh(ball);
                balls.push(ball);
            }
            const special = new Ball3D(0, 2, 0, 2, 3, 1.5, 0.95, 0.55, 0xff3333);
            special.mesh = createBallMesh(special);
            balls.push(special);
        }
        
        const bounds = 7.5;
        const groundY = -2.8;
        const ceilingY = 4.8;
        const dt = 1/60;
        
        function resolveCollision3D(a, b) {
            const dx = a.x - b.x, dy = a.y - b.y, dz = a.z - b.z;
            const dist = Math.hypot(dx, dy, dz);
            if (dist === 0) return;
            const minDist = a.radius + b.radius;
            if (dist < minDist) {
                const nx = dx / dist, ny = dy / dist, nz = dz / dist;
                const overlap = minDist - dist;
                a.x += nx * overlap * 0.5; a.y += ny * overlap * 0.5; a.z += nz * overlap * 0.5;
                b.x -= nx * overlap * 0.5; b.y -= ny * overlap * 0.5; b.z -= nz * overlap * 0.5;
                const rvx = a.vx - b.vx, rvy = a.vy - b.vy, rvz = a.vz - b.vz;
                const velAlong = rvx * nx + rvy * ny + rvz * nz;
                if (velAlong > 0) return;
                const e = (a.restitution + b.restitution) / 2;
                const j = -(1 + e) * velAlong / 2;
                a.vx += j * nx; a.vy += j * ny; a.vz += j * nz;
                b.vx -= j * nx; b.vy -= j * ny; b.vz -= j * nz;
            }
        }
        
        function updatePhysics() {
            for (let b of balls) {
                b.vx += gravity.x * dt; b.vy += gravity.y * dt; b.vz += gravity.z * dt;
                b.x += b.vx * dt; b.y += b.vy * dt; b.z += b.vz * dt;
                if (b.y - b.radius < groundY) { b.y = groundY + b.radius; b.vy = -b.vy * b.restitution; if (Math.abs(b.vy) < 0.5) b.vy = 0; }
                if (b.y + b.radius > ceilingY) { b.y = ceilingY - b.radius; b.vy = -b.vy * b.restitution; }
                if (b.x - b.radius < -bounds) { b.x = -bounds + b.radius; b.vx = -b.vx * b.restitution; }
                if (b.x + b.radius > bounds) { b.x = bounds - b.radius; b.vx = -b.vx * b.restitution; }
                if (b.z - b.radius < -bounds) { b.z = -bounds + b.radius; b.vz = -b.vz * b.restitution; }
                if (b.z + b.radius > bounds) { b.z = bounds - b.radius; b.vz = -b.vz * b.restitution; }
                updateBallMesh(b);
            }
            for (let i = 0; i < balls.length; i++)
                for (let j = i+1; j < balls.length; j++)
                    resolveCollision3D(balls[i], balls[j]);
        }
        
        // Gravity controls (number keys)
        window.addEventListener('keydown', (e) => {
            switch(e.key) {
                case '1': gravity = { x: 0, y: -9.8, z: 0 }; gravityName = 'DOWN'; break;
                case '2': gravity = { x: 0, y: 9.8, z: 0 }; gravityName = 'UP'; break;
                case '3': gravity = { x: -9.8, y: 0, z: 0 }; gravityName = 'LEFT'; break;
                case '4': gravity = { x: 9.8, y: 0, z: 0 }; gravityName = 'RIGHT'; break;
                case '5': gravity = { x: 0, y: 0, z: -9.8 }; gravityName = 'FORWARD'; break;
                case '6': gravity = { x: 0, y: 0, z: 9.8 }; gravityName = 'BACKWARD'; break;
                default: return;
            }
            document.getElementById('gravityDir').innerText = gravityName;
            e.preventDefault();
        });
        
        window.addBall = () => {
            const ball = new Ball3D(
                (Math.random() - 0.5) * 10, Math.random() * 3, (Math.random() - 0.5) * 10,
                (Math.random() - 0.5) * 4, (Math.random() - 0.5) * 4, (Math.random() - 0.5) * 4,
                0.7 + Math.random() * 0.25, 0.45, 0x88aaff
            );
            ball.mesh = createBallMesh(ball);
            balls.push(ball);
        };
        
        window.resetBalls = () => createBalls();
        window.clearBalls = () => {
            balls.forEach(b => { if (b.mesh) scene.remove(b.mesh); });
            balls = [];
        };
        
        function animate() {
            requestAnimationFrame(animate);
            updatePhysics();
            controls.update();
            renderer.render(scene, camera);
        }
        
        createBalls();
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
